<!DOCTYPE html>
<!-- Boomtown Platform — Registrations Admin · Version: v0.3.0 · Date: 2026-07-21 · sidebar added v0.4.0 (2026-07-22)
     Unpaid list + one-click reminder (spec §3.2) · cash collect · Google Forms CSV import · captain score links. -->
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrations — Boomtown Athletics</title>
  <link rel="stylesheet" href="assets/tokens.css?v=0.3.0" />
  <link rel="stylesheet" href="assets/app.css?v=0.3.0" />
  <link rel="stylesheet" href="assets/admin.css?v=0.4.0" />
  <style>
    table.regs { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    table.regs th, table.regs td { text-align: left; padding: 8px 10px; border-bottom: 1px solid rgba(128,128,128,.2); }
    .chip { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 0.78rem; border: 1px solid rgba(128,128,128,.4); }
    .chip.paid { border-color: #3a7; } .chip.pending, .chip.email-sent { border-color: #ca3; } .chip.cash-pending { border-color: #c73; }
    .filters { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
    .filters .btn[aria-pressed="true"] { outline: 2px solid var(--accent, #D4AF37); }
    .linkrow { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(128,128,128,.15); }
    .linkrow code { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.8rem; opacity: 0.8; }
    #status { margin-top: 10px; }
  </style>
</head>
<body>
  <header class="header chrome-glass">
    <div class="wordmark"><a href="index.html" style="color:inherit;text-decoration:none">Boomtown <span>Athletics</span></a></div>
    <div class="spacer"></div>
    <select id="orgSwitcher" class="org-switcher" aria-label="Switch organization"></select>
    <button id="themeToggle" class="btn ghost theme-toggle" aria-label="Toggle dark or light theme">◐</button>
  </header>

  <div class="admin-layout">
  <main class="main wide admin-main" id="app" aria-live="polite">
    <section class="toolbar">
      <select id="eventSelect" class="org-switcher" aria-label="Choose event"></select>
      <a href="tournament.html" class="btn ghost" style="text-decoration:none">Tournament ops</a>
      <div class="spacer"></div>
      <button id="copyRegLink" class="btn ghost">Copy registration link</button>
      <button id="scoreLinksBtn" class="btn ghost">Captain score links</button>
      <label class="btn ghost" style="cursor:pointer">Import CSV<input id="csvFile" type="file" accept=".csv" hidden /></label>
    </section>

    <section class="card">
      <div class="filters" role="group" aria-label="Filter by status">
        <button class="btn ghost" data-filter="" aria-pressed="true">All</button>
        <button class="btn ghost" data-filter="unpaid" aria-pressed="false">Unpaid</button>
        <button class="btn ghost" data-filter="cash-pending" aria-pressed="false">Cash pending</button>
        <button class="btn ghost" data-filter="paid" aria-pressed="false">Paid</button>
      </div>
      <div id="regTable"><p>Pick an event above.</p></div>
      <div id="status" role="status" aria-live="polite"></div>
    </section>

    <section class="card" id="scoreLinksCard" hidden>
      <h2 style="font-size:1rem">Captain score links — text each captain their link</h2>
      <div id="scoreLinksList"></div>
    </section>
  </main>
  </div><!-- /admin-layout -->

  <script src="assets/config.js?v=0.3.0"></script>
  <script src="assets/admin-nav.js?v=0.4.0"></script>
  <script src="assets/admin-registrations.js?v=0.3.0"></script>
</body>
</html>
